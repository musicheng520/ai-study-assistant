server:
  port: 8080

spring:
  application:
    name: ai-study-assistant
  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 40MB

  datasource:
    url: jdbc:mysql://localhost:3306/ai_study_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.msc.springai.aistudyassistant.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  file:
    upload-dir: uploads/course-documents