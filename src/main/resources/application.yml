server:
  port: 8080

spring:
  application:
    name: ai-study-assistant
  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 40MB

  datasource:
    url: jdbc:mysql://localhost:3306/ai_study_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    model:
      chat: openai
      embedding: openai

    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://ws-8tj6pwtxv5lpmpir.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: deepseek-v4-pro
          temperature: 0.2
          max-tokens: 2000

      embedding:
        model: text-embedding-v4
        dimensions: 2048


mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.msc.springai.aistudyassistant.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  file:
    upload-dir: uploads/course-documents

  vector:
    redis-index-name: idx:course_chunks
    redis-key-prefix: "vector:chunk:"
    embedding-model: text-embedding-v4
    embedding-dimension: 2048

  rag:
    cache:
      enabled: true
      ttl-minutes: 30
      key-prefix: "rag:course:"

  retrieval:
    default-top-k: 8
    similarity-threshold: 0.50
    course-generation-query: "Summarize the main topics, key concepts, definitions and exam-relevant ideas from this course."
    document-generation-query: "Summarize the main topics, key concepts, definitions and exam-relevant ideas from this document."